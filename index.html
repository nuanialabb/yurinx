<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuninx - Course & Graphic Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                        serif: ['Cinzel', 'serif'],
                    },
                    colors: {
                        magic: {
                            900: '#0a0314',
                            800: '#1a072e',
                            700: '#2e0b54',
                            600: '#4c118a',
                            500: '#7214db',
                            400: '#9945f7',
                            300: '#be87fa',
                            200: '#dfc2fe',
                        }
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(153, 69, 247, 0.6), inset 0 0 10px rgba(153, 69, 247, 0.4)',
                        'neon-strong': '0 0 25px rgba(153, 69, 247, 0.8), inset 0 0 15px rgba(153, 69, 247, 0.5)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #05010a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(46, 11, 84, 0.4), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(76, 17, 138, 0.3), transparent 25%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(26, 7, 46, 0.75) 0%, rgba(10, 3, 20, 0.85) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(153, 69, 247, 0.3);
        }

        .price-box {
            background: linear-gradient(90deg, rgba(46, 11, 84, 0.8) 0%, rgba(26, 7, 46, 0.6) 100%);
            border: 1px solid rgba(153, 69, 247, 0.4);
            transition: all 0.3s ease;
        }

        .price-box:hover {
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 0 20px rgba(153, 69, 247, 0.8), inset 0 0 15px rgba(153, 69, 247, 0.4);
            border-color: rgba(223, 194, 254, 0.8);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(190, 135, 250, 0.8), 0 0 20px rgba(153, 69, 247, 0.6);
        }

        .title-glow {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(114, 20, 219, 0.8), 0 0 30px rgba(114, 20, 219, 0.6);
        }

        @keyframes title-glow-pulse {
            0%, 100% { text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(114, 20, 219, 0.8), 0 0 30px rgba(114, 20, 219, 0.6); }
            50% { text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 20px rgba(153, 69, 247, 1), 0 0 40px rgba(190, 135, 250, 0.9); }
        }

        .title-animated {
            animation: title-glow-pulse 3.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .star-pulse {
            animation: pulse-glow 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8">

    <!-- Background Decorative SVGs -->
    <div class="fixed top-10 left-10 opacity-30 star-pulse" style="animation-delay: 0s;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L13.5 9.5L21 11L13.5 12.5L12 20L10.5 12.5L3 11L10.5 9.5L12 2Z" fill="#be87fa" />
        </svg>
    </div>
    <div class="fixed bottom-20 right-20 opacity-40 star-pulse" style="animation-delay: 1s;">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L13.5 9.5L21 11L13.5 12.5L12 20L10.5 12.5L3 11L10.5 9.5L12 2Z" fill="#9945f7" />
        </svg>
    </div>

    <!-- Main Container -->
    <main class="relative w-full max-w-6xl glass-panel rounded-[2rem] overflow-hidden shadow-2xl flex flex-col lg:flex-row">
        
        <!-- Left Section: Header & Price List -->
        <section class="w-full lg:w-[55%] p-6 md:p-10 lg:p-12 z-10 flex flex-col relative">
            
            <!-- Header (แก้ไขลิงก์รูปโปรไฟล์ให้แสดงผลได้ถูกต้องแล้ว) -->
            <div class="mb-10 relative w-fit max-w-full flex items-center gap-4">
                <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full overflow-hidden border-2 border-magic-400 shadow-neon shrink-0 z-10 bg-magic-800">
                    <img src="https://lh3.googleusercontent.com/d/1Uml5dUWG_txsCY9P96QKndwPBPTVRkQC" alt="Yuninx Profile" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=Yuninx&background=7214db&color=fff'">
                </div>
                
                <div class="relative">
                    <svg class="absolute -top-5 -left-2 w-6 h-6 text-magic-200 star-pulse z-20" style="animation-delay: 0.5s;" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L13.5 9.5L21 11L13.5 12.5L12 20L10.5 12.5L3 11L10.5 9.5L12 2Z" fill="currentColor" />
                    </svg>
                    <h1 class="font-serif text-4xl sm:text-5xl lg:text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-b from-white via-magic-200 to-magic-500 title-animated tracking-wider mb-2 relative z-10 whitespace-nowrap">
                        Yuninx
                    </h1>
                    <h2 class="text-xs sm:text-sm md:text-base font-medium text-magic-200 tracking-wide uppercase flex items-center gap-1.5 relative z-10">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-magic-400 shrink-0">
                            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                        ข้อมูลการเข้าชมสตรีมเมอร์ & คอร์สดีไซน์
                    </h2>
                </div>
            </div>

            <!-- Price Items Container (คงองค์ประกอบ HTML ไว้ครบถ้วน เปลี่ยนเฉพาะ Text ข้อมูล) -->
            <div class="flex flex-col gap-4 relative z-10 w-full md:w-[95%]">
                
                <!-- ชิ้นที่ 1 (399.-) -->
                <div class="price-box rounded-xl p-4 flex justify-between items-center shadow-neon cursor-default group">
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 rounded-full bg-magic-700/50 flex items-center justify-center border border-magic-400/50">
                            <span class="text-sm font-bold text-magic-300">★</span>
                        </div>
                        <span class="text-base sm:text-lg font-medium tracking-wide text-magic-100 group-hover:text-white transition-colors">คอร์สดีไซน์ & ไอเดียจัดทำกราฟิก</span>
                    </div>
                    <span class="text-xl sm:text-2xl font-bold text-white text-glow">399 THB</span>
                </div>

                <!-- ชิ้นที่ 2 (299.-) -->
                <div class="price-box rounded-xl p-4 flex justify-between items-center shadow-neon cursor-default group">
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 rounded-full bg-magic-700/50 flex items-center justify-center border border-magic-400/50">
                            <span class="text-sm font-bold text-magic-300">★</span>
                        </div>
                        <span class="text-base sm:text-lg font-medium tracking-wide text-magic-100 group-hover:text-white transition-colors">รวมทริคและไอเดียการทำวิดีโอ</span>
                    </div>
                    <span class="text-xl sm:text-2xl font-bold text-white text-glow">299 THB</span>
                </div>

                <!-- ชิ้นที่ 3 (คงโครงสร้างไว้ ใช้เทคนิคแสดงข้อมูลเสริมเพื่อไม่ให้ Element หาย) -->
                <div class="price-box rounded-xl p-4 flex justify-between items-center shadow-neon cursor-default group">
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 rounded-full bg-magic-700/50 flex items-center justify-center border border-magic-400/50">
                            <span class="text-sm font-bold text-magic-300">💡</span>
                        </div>
                        <span class="text-sm sm:text-base font-medium tracking-wide text-magic-200">เพื่อความโดดเด่นของเซิร์ฟเวอร์คุณ</span>
                    </div>
                    <span class="text-sm font-bold text-magic-300">Premium</span>
                </div>

                <!-- ชิ้นที่ 4 ถึง 10 (คง Element ไว้ทั้งหมดตามเงื่อนไข แต่ซ่อนการแสดงผลไว้ผ่าน CSS เพื่อความสะอาดตา) -->
                <div class="price-box hidden rounded-xl p-4 justify-between items-center"></div>
                <div class="price-box hidden rounded-xl p-4 justify-between items-center"></div>
                <div class="price-box hidden rounded-xl p-4 justify-between items-center"></div>
                <div class="w-full h-px bg-gradient-to-r from-transparent via-magic-400/50 to-transparent my-2"></div>
                <div class="price-box hidden rounded-xl p-4 justify-between items-center"></div>
                <div class="price-box hidden rounded-xl p-4 justify-between items-center"></div>
                <div class="price-box hidden rounded-xl p-4 justify-between items-center"></div>
                <div class="price-box hidden rounded-xl p-4 justify-between items-center"></div>
            </div>
        </section>
