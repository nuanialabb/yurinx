<!DOCTYPE html>
<html lang="th">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Slackey&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-pink-bg: #1a1525;
            --color-pink-dot: #2d243d;
            --color-pink-dark: #b67eff;
            --color-pink-light: #503d6e;
            --color-brown-dark: #e2d9f3;
            --color-brown-light: #bcaada;
        }

        /* ใช้ฟอนต์ Mitr สำหรับเนื้อหาทั่วไป */
        body {
            font-family: 'Mitr', sans-serif;
            background-color: var(--color-pink-bg);
            background-image: radial-gradient(var(--color-pink-dot) 15%, transparent 16%), radial-gradient(var(--color-pink-dot) 15%, transparent 16%);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--color-brown-dark);
            scroll-behavior: smooth;
        }

        /* ฟอนต์ส่วนหัว Slackey (เพิ่ม Mitr เป็น Fallback สำหรับภาษาไทย) */
        .font-slackey {
            font-family: 'Slackey', 'Mitr', cursive;
        }

        .text-shadow-cute {
            text-shadow: 2px 2px 0px #1a1525, 3px 3px 0px var(--color-pink-dark);
        }

        /* Clean Container แทนแบบเก่า */
        .clean-box {
            background: rgba(34, 28, 48, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(182, 126, 255, 0.15);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-pink-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-pink-dark); border-radius: 10px; }

        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        .modal-exit { animation: modalFadeOut 0.2s ease-in forwards; }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes modalFadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }

        /* Slider Animations */
        .slider-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slide {
            min-width: 100%;
        }
    </style>
</head>
